version: 2

project_name: falcode

before:
  hooks:
    - go mod tidy

builds:
  - id: falcode
    main: .
    binary: falcode
    ldflags:
      - -s -w
      - -X 'github.com/victor-falcon/falcode/cmd.Version={{.Version}}'
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: falcode
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: victor-falcon
    name: falcode
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"

homebrew_casks:
  - name: falcode
    binaries:
      - falcode
    repository:
      owner: victor-falcon
      name: homebrew-falcode
      branch: main
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/victor-falcon/falcode"
    description: "Terminal multiplexer for multi-agent git worktree workflows"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/falcode"]
          end
